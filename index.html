<div class="container">

  <p class="subtitle">Send rich-text messages via Telegram Bot API (sendRichMessage)</p>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
<script>
const tokenInput = document.getElementById('token');
const chatIdInput = document.getElementById('chatId');
const messageInput = document.getElementById('messageInput');
const preview = document.getElementById('preview');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const rtlCheck = document.getElementById('rtl');
const skipEntitiesCheck = document.getElementById('skipEntities');
const disableNotifyCheck = document.getElementById('disableNotify');
const insertSampleBtn = document.getElementById('insertSample');

/* ---- Telegram Rich Markdown Preprocessor ---- */
function preprocessTG(md) {
  md = md
    .replace(/<tg-slideshow>\n?([\s\S]*?)\n?<\/tg-slideshow>/g, (_, content) =>
      `<div class="tg-slideshow">\n${preprocessInner(content)}\n</div>`)
    .replace(/<tg-collage>\n?([\s\S]*?)\n?<\/tg-collage>/g, (_, content) =>
      `<div class="tg-collage">\n${preprocessInner(content)}\n</div>`)
    .replace(/<(details)\s*(open)?>\n?([\s\S]*?)\n?<\/details>/g, (_, t, open, content) =>
      `<details${open ? ' open' : ''}>\n${preprocessInner(content)}\n</details>`)
    .replace(/<aside>([\s\S]*?)<\/aside>/g, (_, content) =>
      `<aside class="tg-pullquote">${preprocessInner(content)}</aside>`)
    .replace(/<footer>([\s\S]*?)<\/footer>/g, (_, content) =>
      `<footer class="tg-footer">${preprocessInner(content)}</footer>`)
    .replace(/<tg-map\s+lat="([^"]*)"\s+long="([^"]*)"\s+zoom="([^"]*)"\s*\/?>/g,
      (_, lat, lon, zoom) => `<div class="tg-map">📍 <b>${lat}</b>, <b>${lon}</b> (zoom ${zoom})</div>`)
    .replace(/<tg-thinking>([\s\S]*?)<\/tg-thinking>/g, (_, content) =>
      `<div class="tg-thinking"><i>🧠 Thinking...</i><br>${content}</div>`);

  md = preprocessInner(md);
  return md;
}

function preprocessInner(text) {
  text = text.replace(/\|\|([^|]+)\|\|/g, '<span class="tg-spoiler">$1</span>');
  text = text.replace(/==([^=]+)==/g, '<mark>$1</mark>');
  text = text.replace(/\$\$(.+?)\$\$/gs, '<tg-math-block>$1</tg-math-block>');
  text = text.replace(/(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g, '<tg-math>$1</tg-math>');
  text = text.replace(/```math\s*\n?([\s\S]*?)```/g, '<tg-math-block>$1</tg-math-block>');

  text = text.replace(/!\[([^\]]*)\]\(tg:\/\/time\?([^)]+)\)/g, (_, alt, params) => {
    const p = new URLSearchParams(params);
    return `<span class="tg-datetime" title="unix:${p.get('unix')}, format:${p.get('format')}">${alt}</span>`;
  });
  text = text.replace(/!\[([^\]]*)\]\(tg:\/\/emoji\?id=(\d+)\)/g, (_, alt, id) =>
    `<span class="tg-custom-emoji" title="Emoji ${id}">${alt || '🪄'}</span>`);

  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, url) => {
    const cleanUrl = url.replace(/\s+"[^"]*"$/, '').trim();
    const title = url.match(/\s+"([^"]*)"$/)?.[1] || '';
    if (/\.(mp4|webm|mov|avi|mkv)([?#]|$)/i.test(cleanUrl))
      return `<div class="tg-media-container"><video src="${cleanUrl}" controls class="tg-media"></video>${title ? `<div class="tg-media-caption">${title}</div>` : ''}</div>`;
    if (/\.(mp3|ogg|wav|flac|aac|m4a)([?#]|$)/i.test(cleanUrl))
      return `<div class="tg-media-container"><audio src="${cleanUrl}" controls class="tg-media"></audio>${title ? `<div class="tg-media-caption">${title}</div>` : ''}</div>`;
    if (/\.(gif)([?#]|$)/i.test(cleanUrl))
      return title ? `<figure><img src="${cleanUrl}" alt="${alt || title}"><figcaption>${title}</figcaption></figure>` : `<img src="${cleanUrl}" alt="">`;
    if (title)
      return `<figure><img src="${cleanUrl}" alt="${alt || title}"><figcaption>${title}</figcaption></figure>`;
    return match;
  });

  text = text.replace(/- \[( |x)\]/g, (_, chk) =>
    `<input type="checkbox" disabled ${chk === 'x' ? 'checked' : ''} style="margin:0 4px 0 0;vertical-align:middle;width:14px;height:14px">`);

  text = processFootnotes(text);

  return text;
}

function processFootnotes(text) {
  const defs = [];
  text = text.replace(/\[(\^([^\]]+))\]\s*:\s+([\s\S]*?)(?=\n\n|\n\[|$)/g, (_, full, label, content) => {
    defs.push({ label, content: content.trim() });
    return '';
  });
  if (defs.length === 0) return text;
  text = text.replace(/\[\^([^\]]+)\]/g, (_, label) => {
    const idx = defs.findIndex(d => d.label === label);
    if (idx === -1) return `[^${label}]`;
    return `<sup class="tg-fnref"><a href="#fn-${idx}" style="color:#58a6ff;text-decoration:none">[${idx + 1}]</a></sup>`;
  });
  let fnHtml = '<div class="tg-footnotes">';
  defs.forEach((d, i) => {
    fnHtml += `<div class="tg-fn" id="fn-${i}"><sup>[${i + 1}]</sup> ${d.content}</div>`;
  });
  fnHtml += '</div>';
  text += '\n\n' + fnHtml;
  return text;
}

/* ---- Render ---- */
function renderPreview() {
  const md = messageInput.value.trim();
  if (!md) {
    preview.innerHTML = '<div class="preview-placeholder">Preview</div>';
    return;
  }
  try {
    const processed = preprocessTG(md);
    const html = marked.parse(processed, { breaks: true, gfm: true });
    preview.innerHTML = html;
    initInteractions();
  } catch (e) {
    preview.innerHTML = `<div class="preview-placeholder">Rendering error: ${e.message}</div>`;
  }
}

function initInteractions() {
  preview.querySelectorAll('.tg-spoiler').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('revealed'));
  });
}

/* ---- Media error fallback ---- */
preview.addEventListener('error', (e) => {
  const t = e.target;
  if (t.tagName === 'VIDEO' || t.tagName === 'AUDIO') {
    const c = t.closest('.tg-media-container');
    if (c) {
      const url = t.currentSrc || t.src;
      const type = t.tagName === 'VIDEO' ? '🎬 Video' : '🎵 Audio';
      c.innerHTML = `<div class="tg-media-fallback">${type} failed to load: <code>${escapeHtml(url)}</code></div>`;
    }
  }
}, true);

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

messageInput.addEventListener('input', renderPreview);
renderPreview();

insertSampleBtn.addEventListener('click', () => {

/* ---- Send ---- */
async function sendMessage() {
  const token = tokenInput.value.trim();
  const chatId = chatIdInput.value.trim();
  const markdown = messageInput.value.trim();

  if (!token) { showStatus('error', 'Error', 'Enter bot token'); return; }
  if (!chatId) { showStatus('error', 'Error', 'Enter chat ID'); return; }
  if (!markdown) { showStatus('error', 'Error', 'Enter message text'); return; }

  showStatus('loading', 'Sending...', 'Sending message...');

  const body = {
    chat_id: chatId,
    rich_message: { markdown: markdown },
  };

  if (rtlCheck.checked) body.rich_message.is_rtl = true;
  if (skipEntitiesCheck.checked) body.rich_message.skip_entity_detection = true;
  if (disableNotifyCheck.checked) body.disable_notification = true;

  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/sendRichMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      showStatus('success', 'Success!', `Message sent. ID: ${data.result.message_id}`);
    } else {
      showStatus('error', `Error ${data.error_code}`, data.description || 'Unknown error');
    }
  } catch (err) {
    showStatus('error', 'Network error', err.message);
  }
}

function showStatus(type, label, detail) {
  statusEl.className = `status ${type}`;
  statusEl.innerHTML = `<div class="msg-label">${label}</div><div class="msg-detail">${detail}</div>`;
}

sendBtn.addEventListener('click', sendMessage);

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendMessage();
});
